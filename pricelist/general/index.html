        <!-- CSS untuk mematikan interaksi klik/tahan pada gambar -->
    <style>
        /* Mencegah user mengklik kanan atau menahan jari pada layar (mobile) */
        img, video, canvas, svg {
            -webkit-touch-callout: none; /* iOS Safari */
            -webkit-user-select: none;   /* Safari */
            -khtml-user-select: none;    /* Konqueror HTML */

        /* Jika Anda tetap ingin tombol video berfungsi,

        .video-protected {
            pointer-events: auto !important;
        }
    </style>

    <script>
        // 1. Matikan Klik Kanan di Seluruh Halaman
        document.addEventListener('contextmenu', event => event.preventDefault());

        // 2. Matikan Shortcut Keyboard (Ctrl+S, Ctrl+U, Ctrl+Shift+I)
        document.addEventListener('keydown', function(e) {
            // Blokir Save (Ctrl+S atau Cmd+S)
            if ((e.ctrlKey || e.metaKey) && e.keyCode == 83) {
                e.preventDefault();
            }
            // Blokir View Source (Ctrl+U)
            if ((e.ctrlKey || e.metaKey) && e.keyCode == 85) {
                e.preventDefault();
            }
            // Blokir Inspect Element (F12 atau Ctrl+Shift+I)
            if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.keyCode == 73)) {
                e.preventDefault();
            }
        });

        // 3. Mencegah Drag-and-Drop Gambar/Video ke Tab Baru
        document.addEventListener('dragstart', function(e) {
            if (e.target.nodeName === 'IMG' || e.target.nodeName === 'VIDEO') {
                e.preventDefault();
            }
        });
    </script>
